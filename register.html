<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <!-- Firebase SDKs -->
 <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .box {
      max-width: 350px;
      margin: auto;
      padding: 20px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Create Account</h2>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="register()">Register</button>

    <p id="message" style="color:red; margin-top:10px;"></p>

    <p style="margin-top:15px;">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>

  <script>
    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA5v7-vP87dJ2mN9Y7hbBM29X2KK4W6Tr0",
      authDomain: "xpert-forex-trade.firebaseapp.com",
      databaseURL: "https://xpert-forex-trade-default-rtdb.firebaseio.com",
      projectId: "xpert-forex-trade",
      storageBucket: "xpert-forex-trade.firebasestorage.app",
      messagingSenderId: "491439791457",
      appId: "1:491439791457:web:5c30d0c48599b72634b920"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Register function
    function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("message").style.color = "green";
          document.getElementById("message").innerText = "Account created successfully!";
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1200);
        })
        .catch((error) => {
          document.getElementById("message").innerText = error.message;
        });
    }
  </script>

</body>
</html>
